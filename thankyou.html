<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>تم الإرسال بنجاح</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --primary:#0d6e4f;
      --primary-dark:#084a36;
      --bg:#f4f8f7;
      --card:#ffffff;
      --text:#1f2d2a;
      --muted:#6a7b76;
      --shadow:0 10px 30px rgba(0,0,0,0.08);
      --radius:18px;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Tajawal',sans-serif;
      background:var(--bg);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      color:var(--text);
    }

    .card{
      background:var(--card);
      width:100%;
      max-width:600px;
      border-radius:var(--radius);
      padding:50px 35px;
      text-align:center;
      box-shadow:var(--shadow);
    }

    .icon{
      width:90px;
      height:90px;
      margin:0 auto 25px;
      border-radius:50%;
      background:rgba(13,110,79,0.1);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:42px;
      color:var(--primary);
    }

    h1{
      font-size:2rem;
      margin-bottom:15px;
      color:var(--primary-dark);
      font-weight:800;
    }

    p{
      font-size:1rem;
      line-height:1.9;
      color:var(--muted);
      margin-bottom:30px;
    }

    .btn{
      display:inline-block;
      text-decoration:none;
      background:var(--primary);
      color:#fff;
      padding:14px 28px;
      border-radius:50px;
      font-weight:700;
      transition:0.2s;
    }

    .btn:hover{
      background:var(--primary-dark);
      transform:translateY(-2px);
    }

    .footer{
      margin-top:30px;
      font-size:0.85rem;
      color:var(--muted);
    }
  </style>
</head>

<body>

  <div class="card">

    <div class="icon">
      ✓
    </div>

    <h1>تم إرسال النموذج بنجاح</h1>

    <p>
      شكراً لك، تم استلام إجاباتك بنجاح.<br>
      سيتم مراجعة التفاصيل والتواصل معك قريباً لمناقشة المشروع والخطوات القادمة.
    </p>

    <a href="index.html" class="btn">
      العودة للنموذج
    </a>

    <div class="footer">
      ساعي الأطلال للخدمات اللوجستية والتوصيل السريع
    </div>

  </div>

</body>
</html>
